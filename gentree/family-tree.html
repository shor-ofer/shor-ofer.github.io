        function getPersonName(person) {
            // Helper to check if a name is valid (not empty, null, or just punctuation)
            const isValidName = (str) => {
                if (!str) return false;
                const cleaned = str.trim().replace(/[.\-_]/g, '');
                return cleaned.length > 0;
            };
            
            if (currentLanguage === 'en') {
                // Try English name first, fall back to Hebrew if English is invalid
                if (isValidName(person.nameEn)) {
                    return person.nameEn;
                } else if (isValidName(person.name)) {
                    return person.name;
                }
                return 'Unknown';
            } else {
                // Try Hebrew name first, fall back to English if Hebrew is invalid
                if (isValidName(person.name)) {
                    return person.name;
                } else if (isValidName(person.nameEn)) {
                    return person.nameEn;
                }
                return 'לא ידוע';
            }
        }
        
        function getYearOnly(dateStr) {
            if (!dateStr) return '';
            // If date contains /, extract the year part (last element)
            if (dateStr.includes('/')) {
                const parts = dateStr.split('/');
                return parts[parts.length - 1];
            }
            // Otherwise it's already just a year
            return dateStr;
        }
        
        function populateDropdown() {
            // Helper to check if a name part is valid (not empty, null, or just punctuation)
            const isValidNamePart = (str) => {
                if (!str) return false;
                const cleaned = str.trim().replace(/[.\-_]/g, '');
                return cleaned.length > 0;
            };
            
            // Filter out people with no valid name data at all (stub entries)
            const validPeople = allPeople.filter(person => {
                return isValidNamePart(person.name) || 
                       isValidNamePart(person.nameEn) ||
                       isValidNamePart(person.firstName) ||
                       isValidNamePart(person.firstNameEn);
            });
            
            // Store all people for searching
            window.searchablePeople = validPeople.map(person => {
                
                const getNameComponents = () => {
                    if (currentLanguage === 'en') {
                        let firstName = isValidNamePart(person.firstNameEn) ? person.firstNameEn : '';
                        let lastName = isValidNamePart(person.lastNameEn) ? person.lastNameEn : '';
                        
                        // If no valid English name parts, try to use full English name or fall back to Hebrew
                        if (!firstName && !lastName) {
                            const fullName = person.nameEn && isValidNamePart(person.nameEn) ? person.nameEn : 
                                           (person.name && isValidNamePart(person.name) ? person.name : '');
                            if (fullName) {
                                const parts = fullName.trim().split(/\s+/).filter(isValidNamePart);
                                if (parts.length > 1) {
                                    return { 
                                        firstName: parts.slice(0, -1).join(' '),
                                        lastName: parts[parts.length - 1]
                                    };
                                }
                                return { firstName: fullName, lastName: '' };
                            }
                        }
                        return { firstName, lastName };
                    } else {
                        let firstName = isValidNamePart(person.firstName) ? person.firstName : '';
                        let lastName = isValidNamePart(person.lastName) ? person.lastName : '';
                        
                        // If no valid Hebrew name parts, try to use full Hebrew name or fall back to English
                        if (!firstName && !lastName) {
                            const fullName = person.name && isValidNamePart(person.name) ? person.name : 
                                           (person.nameEn && isValidNamePart(person.nameEn) ? person.nameEn : '');
                            if (fullName) {
                                const parts = fullName.trim().split(/\s+/).filter(isValidNamePart);
                                if (parts.length > 1) {
                                    return { 
                                        firstName: parts.slice(0, -1).join(' '),
                                        lastName: parts[parts.length - 1]
                                    };
                                }
                                return { firstName: fullName, lastName: '' };
                            }
                        }
                        return { firstName, lastName };
                    }
                };
                
                const names = getNameComponents();
                // Display format: "LastName, FirstName" or just "FirstName" if no last name
                // Only show "Unknown" if there's truly no valid name at all
                const displayName = names.lastName ? `${names.lastName}, ${names.firstName}` : 
                                  (names.firstName || translations[currentLanguage].unknown);
                
                // Build comprehensive searchText including ALL name variations
                const searchParts = [];
                
                // Add Hebrew names
                if (person.firstName) searchParts.push(person.firstName);
                if (person.lastName) searchParts.push(person.lastName);
                if (person.name) searchParts.push(person.name);
                if (person.nickname) searchParts.push(person.nickname);
                if (person.previousFirstName) searchParts.push(person.previousFirstName);
                if (person.previousLastName) searchParts.push(person.previousLastName);
                if (person.previousName) searchParts.push(person.previousName);
                
                // Add English names
                if (person.firstNameEn) searchParts.push(person.firstNameEn);
                if (person.lastNameEn) searchParts.push(person.lastNameEn);
                if (person.nameEn) searchParts.push(person.nameEn);
                if (person.nicknameEn) searchParts.push(person.nicknameEn);
                if (person.previousFirstNameEn) searchParts.push(person.previousFirstNameEn);
                if (person.previousLastNameEn) searchParts.push(person.previousLastNameEn);
                if (person.previousNameEn) searchParts.push(person.previousNameEn);
                
                // Create searchable text with all variations
                const searchText = searchParts.join(' ').toLowerCase();
                
                return {
                    id: person.id,
                    displayName: displayName,
                    searchText: searchText,
                    firstName: names.firstName,
                    lastName: names.lastName
                };
            });
            
            // Sort by last name, then first name
            window.searchablePeople.sort((a, b) => {
                const lastNameComp = a.lastName.localeCompare(b.lastName, currentLanguage === 'en' ? 'en' : 'he');
                if (lastNameComp !== 0) return lastNameComp;
                return a.firstName.localeCompare(b.firstName, currentLanguage === 'en' ? 'en' : 'he');
            });
            
            // Clear search input
            const searchInput = document.getElementById('root-search');
            searchInput.value = '';
            
            // Update placeholder and tooltip based on language
            const t = translations[currentLanguage];
            searchInput.placeholder = currentLanguage === 'en' ? 'Search name...' : 'חפש שם...';
            searchInput.title = t.searchHint;
            searchInput.style.textAlign = currentLanguage === 'en' ? 'left' : 'right';
            searchInput.style.direction = currentLanguage === 'en' ? 'ltr' : 'rtl';
        }
        
        function setupSearchFunctionality() {
            const searchInput = document.getElementById('root-search');
            const dropdown = document.getElementById('search-dropdown');
            const clearBtn = document.getElementById('search-clear');
            const searchContainer = searchInput.parentElement;
            let selectedIndex = -1;
            
            // Update clear button visibility
            function updateClearButton() {
                if (searchInput.value) {
                    searchContainer.classList.add('has-value');
                } else {
                    searchContainer.classList.remove('has-value');
                }
            }
            
            function showDropdown(searchTerm = '') {
                dropdown.innerHTML = '';
                selectedIndex = -1;
                
                // Filter people (or show all if no search term)
                const filtered = searchTerm 
                    ? window.searchablePeople.filter(p => p.searchText.includes(searchTerm))
                    : window.searchablePeople;
                
                // Show all results (no limit)
                const displayList = filtered;
                
                if (displayList.length === 0) {
                    const noResults = document.createElement('div');
                    noResults.className = 'no-results';
                    noResults.textContent = currentLanguage === 'en' ? 'No results found' : 'לא נמצאו תוצאות';
                    dropdown.appendChild(noResults);
                    dropdown.classList.add('show');
                    return;
                }
                
                // Add filtered options
                displayList.forEach((person, index) => {
                    const fullPerson = allPeople.find(p => p.id === person.id);
                    const option = document.createElement('div');
                    option.className = 'search-option';
                    option.setAttribute('data-id', person.id);
                    option.setAttribute('data-index', index);
                    
                    // Build display with both languages
                    let displayHTML = `<div class="person-name">${person.displayName}</div>`;
                    
                    // Add alternate language name if available
                    if (currentLanguage === 'he' && fullPerson.nameEn) {
                        displayHTML += `<div class="person-name-alt">${fullPerson.nameEn}</div>`;
                    } else if (currentLanguage === 'en' && fullPerson.name) {
                        displayHTML += `<div class="person-name-alt">${fullPerson.name}</div>`;
                    }
                    
                    // Show nickname if it exists and (no search or search matches it)
                    const nickname = currentLanguage === 'en' ? (fullPerson.nicknameEn || fullPerson.nickname) : fullPerson.nickname;
                    if (nickname && (!searchTerm || nickname.toLowerCase().includes(searchTerm))) {
                        displayHTML += `<div class="person-nickname">(${nickname})</div>`;
                    }
                    
                    option.innerHTML = displayHTML;
                    
                    option.addEventListener('click', function() {
                        selectPersonFromSearch(person.id, person.displayName);
                    });
                    
                    dropdown.appendChild(option);
                });
                
                dropdown.classList.add('show');
            }
            
            // Show all people when clicking on the search input
            searchInput.addEventListener('focus', function() {
                showDropdown(this.value.toLowerCase().trim());
            });
            
            // Filter as user types
            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase().trim();
                showDropdown(searchTerm);
                updateClearButton();
            });
            
            // Clear button click
            clearBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                searchInput.value = '';
                updateClearButton();
                dropdown.classList.remove('show');
                searchInput.focus();
            });
            
            // Keyboard navigation
            searchInput.addEventListener('keydown', function(e) {
                const options = dropdown.querySelectorAll('.search-option');
                
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    selectedIndex = Math.min(selectedIndex + 1, options.length - 1);
                    updateSelectedOption(options, selectedIndex);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    selectedIndex = Math.max(selectedIndex - 1, 0);
                    updateSelectedOption(options, selectedIndex);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (selectedIndex >= 0 && options[selectedIndex]) {
                        const personId = parseInt(options[selectedIndex].getAttribute('data-id'));
                        const displayName = options[selectedIndex].textContent;
                        selectPersonFromSearch(personId, displayName);
                    }
                } else if (e.key === 'Escape') {
                    dropdown.classList.remove('show');
                    selectedIndex = -1;
                }
            });
            
            // Close dropdown when clicking outside
            document.addEventListener('click', function(e) {
                if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.remove('show');
                }
            });
            
            function updateSelectedOption(options, index) {
                options.forEach((opt, i) => {
                    opt.classList.toggle('selected', i === index);
                });
                if (options[index]) {
                    options[index].scrollIntoView({ block: 'nearest' });
                }
            }
            
            function selectPersonFromSearch(personId, displayName) {
                setSearchValue(displayName);
                dropdown.classList.remove('show');
                addToHistory(personId); // Add to navigation history
                renderTree(personId);
                showPersonDetails(personId);
                // Update URL to reflect new focus
                const url = new URL(window.location);
                url.searchParams.set('focus', personId);
                window.history.pushState({}, '', url);
            }
        }

        async function loadData() {
            try {
                const response = await fetch('./assets/data/people.json');
                const data = await response.json();
                
                data.people.forEach(person => {
                    peopleMap.set(person.id, person);
                });
                
                allPeople = data.people;
                
                populateDropdown();
                setupSearchFunctionality();
                
                const roots = data.people.filter(p => !p.parents || p.parents.length === 0);
                
                return { people: data.people, roots };
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').textContent = 'שגיאה בטעינת הנתונים';
                throw error;
            }
        }
        
        // Helper function to get all spouses for a person
        function getPersonSpouses(person) {
            if (!person) return [];
            
            if (person.spouses && person.spouses.length > 0) {
                return person.spouses.map(s => {
                    const spouseData = peopleMap.get(s.id);
                    return spouseData ? {
                        id: spouseData.id,
                        name: spouseData.name || spouseData.nameEn || 'לא ידוע',
                        gender: spouseData.gender,
                        data: spouseData,
                        order: s.order,
                        current: s.current,
                        startYear: s.startYear,
                        endYear: s.endYear
                    } : null;
                }).filter(s => s !== null).sort((a, b) => a.order - b.order);
            } else if (person.spouse) {
                const spouse = peopleMap.get(person.spouse);
                if (spouse) {
                    return [{
                        id: spouse.id,
                        name: spouse.name || spouse.nameEn || 'לא ידוע',
                        gender: spouse.gender,
                        data: spouse,
                        order: 0,
                        current: true
                    }];
                }
            }
            return [];
        }

        // Helper function to get siblings (including half-siblings via shared parents)
        function getPersonSiblings(person) {
            if (!person) return [];

            const siblingIds = new Set(person.siblings || []);
            if (person.parents && person.parents.length > 0) {
                person.parents.forEach(parentId => {
                    const parent = peopleMap.get(parentId);
                    if (parent && parent.children && parent.children.length > 0) {
                        parent.children.forEach(childId => {
                            if (childId !== person.id) {
                                siblingIds.add(childId);
                            }
                        });
                    }
                });
            }

            return Array.from(siblingIds)
                .map(id => peopleMap.get(id))
                .filter(sibling => sibling);
        }

        // Helper: calculate the visual width of a person + their spouses as rendered
        // When a person has spouses, rendering shifts person -PERSON_SHIFT and places spouses at +SPOUSE_FIRST_OFFSET, etc.
        // Returns { leftExtent, rightExtent, totalWidth } from the node group origin (d.x)
        function getNodeVisualExtent(numSpouses) {
            const { HALF_BOX_WIDTH, PERSON_SHIFT, SPOUSE_SPACING, SPOUSE_FIRST_OFFSET } = CONFIG;
            
            if (numSpouses === 0) {
                // No spouse: person box centered at 0
                return { leftExtent: HALF_BOX_WIDTH, rightExtent: HALF_BOX_WIDTH, totalWidth: CONFIG.BOX_WIDTH };
            }
            // Has spouses: person shifted left, spouses placed to the right
            // Person at -PERSON_SHIFT, left edge at -PERSON_SHIFT - HALF_BOX_WIDTH
            // Last spouse at SPOUSE_FIRST_OFFSET + (N-1) * SPOUSE_SPACING, right edge + HALF_BOX_WIDTH
            const left = PERSON_SHIFT + HALF_BOX_WIDTH;
            const right = SPOUSE_FIRST_OFFSET + (numSpouses - 1) * SPOUSE_SPACING + HALF_BOX_WIDTH;
            return { leftExtent: left, rightExtent: right, totalWidth: left + right };
        }

        function buildFamilyLayout(personId) {
            const person = peopleMap.get(personId);
            if (!person) return null;
            
            const nodes = [];
            const links = [];
            const shownAsSpouse = new Map(); // spouseId -> { hostNodeId, spouseIndex } for people shown as spouse boxes
            
            // Use CONFIG for layout constants
            const { NODE_WIDTH: nodeWidth, NODE_HEIGHT: nodeHeight, GAP_X: gapX, GAP_Y: gapY, SIBLING_GAP: GAP } = CONFIG.LAYOUT;
            
            // Helper to create a node for a person with their spouses
            function createPersonNode(p, x, y, isFocus = false) {
                const node = {
                    id: p.id,
                    name: p.name || p.nameEn || 'לא ידוע',
                    gender: p.gender,
                    data: p,
                    x: x,
                    y: y
                };
                if (isFocus) node.isFocus = true;
                
                const spouses = getPersonSpouses(p);
                if (spouses.length > 0) {
                    node.allSpouses = spouses;
                    node.spouse = spouses.find(s => s.current) || spouses[spouses.length - 1];
                    // Sort spouses the same way as rendering: current first, then by order
                    const sortedForRender = [...spouses].sort((a, b) => {
                        if (a.current && !b.current) return -1;
                        if (!a.current && b.current) return 1;
                        return (a.order ?? 0) - (b.order ?? 0);
                    });
                    // Mark all spouses with their RENDER position index
                    sortedForRender.forEach((sp, idx) => shownAsSpouse.set(sp.id, { hostNodeId: p.id, spouseIndex: idx }));
                }
                
                return node;
            }
            
            // Calculate required width for a person's subtree (only what will be displayed)
            const subtreeWidthCache = new Map();
            function getSubtreeWidth(p, remainingDepth) {
                // Get own visual extent (person + spouses)
                const spouses = getPersonSpouses(p);
                const ownExtent = getNodeVisualExtent(spouses.length);
                
                // If no more levels to show, just return own width
                if (remainingDepth <= 0) {
                    return ownExtent.totalWidth;
                }
                
                const cacheKey = `${p.id}_${remainingDepth}`;
                if (subtreeWidthCache.has(cacheKey)) {
                    return subtreeWidthCache.get(cacheKey);
                }
                
                // If no children, just return own width
                if (!p.children || p.children.length === 0) {
                    subtreeWidthCache.set(cacheKey, ownExtent.totalWidth);
                    return ownExtent.totalWidth;
                }
                
                // Sum up children's subtree widths (one level deeper)
                let childrenTotalWidth = 0;
                let validChildren = 0;
                p.children.forEach((childId) => {
                    const child = peopleMap.get(childId);
                    if (child) {
                        if (validChildren > 0) {
                            childrenTotalWidth += GAP;
                        }
                        childrenTotalWidth += getSubtreeWidth(child, remainingDepth - 1);
                        validChildren++;
                    }
                });
                
                // Width needed is max of own width and children's total width
                const width = Math.max(ownExtent.totalWidth, childrenTotalWidth);
                subtreeWidthCache.set(cacheKey, width);
                return width;
            }
            
            // Calculate required width for a person's ancestor tree (going upward)
            // Similar to subtree width but looking at parents instead of children
            // IMPORTANT: Both parents have separate ancestor trees that need space
            const ancestorWidthCache = new Map();
            function getAncestorTreeWidth(p, remainingLevels) {
                // Get own visual extent (person + spouses)
                const spouses = getPersonSpouses(p);
                const ownExtent = getNodeVisualExtent(spouses.length);
                
                // If no more levels to show, just return own width
                if (remainingLevels <= 0) {
                    return ownExtent.totalWidth;
                }
                
                const cacheKey = `${p.id}_anc_${remainingLevels}`;
                if (ancestorWidthCache.has(cacheKey)) {
                    return ancestorWidthCache.get(cacheKey);
                }
                
                // If no parents, just return own width
                if (!p.parents || p.parents.length === 0) {
                    ancestorWidthCache.set(cacheKey, ownExtent.totalWidth);
                    return ownExtent.totalWidth;
                }
                
                // Calculate combined width needed for ALL parents' ancestor trees
                // Parents are rendered as couple (primary + spouse), but both have ancestors above
                let parentsAncestorWidth = 0;
                let validParents = 0;
                
                p.parents.forEach(parentId => {
                    const parent = peopleMap.get(parentId);
                    if (!parent) return;
                    
                    // Each parent needs space for their own ancestors
                    const parentAncestorWidth = getAncestorTreeWidth(parent, remainingLevels - 1);
                    if (validParents > 0) {
                        parentsAncestorWidth += GAP; // Gap between parent ancestor trees
                    }
                    parentsAncestorWidth += parentAncestorWidth;
                    validParents++;
                });
                
                // Also consider the immediate parent couple's visual extent
                const primaryParent = peopleMap.get(p.parents[0]);
                let coupleExtent = ownExtent.totalWidth;
                if (primaryParent) {
                    const parentSpouses = getPersonSpouses(primaryParent);
                    const additionalSpouses = p.parents.length > 1 ? 1 : 0;
                    const effectiveSpouses = Math.max(parentSpouses.length, additionalSpouses);
                    coupleExtent = getNodeVisualExtent(effectiveSpouses).totalWidth;
                }
                
                // Width needed is max of own width, couple extent, and combined parents' ancestor widths
                const width = Math.max(ownExtent.totalWidth, coupleExtent, parentsAncestorWidth);
                ancestorWidthCache.set(cacheKey, width);
                return width;
            }
            
            // Helper to add ancestors for a given set of people at a given level
            // peopleToTrace: people whose parents we need to show (includes both parents from previous level)
            // This is separate from rendering - we trace ancestry for BOTH parents even if one is shown as spouse
            function addAncestorsForLevel(peopleToTrace, level) {
                if (level > levelsUp) return { nodes: [], nextLevelPeople: [] };
                
                const ancestorNodes = [];
                const nextLevelPeople = []; // Track all parents for next level tracing
                const y = -level * gapY;
                
                // Collect family units: each child with their parents to position
                const familyGroups = [];
                
                peopleToTrace.forEach(p => {
                    if (!p.parents || p.parents.length === 0) return;
                    
                    // Find child's visual position (node or spouse box)
                    let childX = 0;
                    const childNode = nodes.find(n => n.id === p.id);
                    if (childNode) {
                        childX = childNode.x;
                    } else if (shownAsSpouse.has(p.id)) {
                        const spouseInfo = shownAsSpouse.get(p.id);
                        const hostNode = nodes.find(n => n.id === spouseInfo.hostNodeId);
                        if (hostNode) {
                            childX = hostNode.x + CONFIG.SPOUSE_FIRST_OFFSET + (spouseInfo.spouseIndex * CONFIG.SPOUSE_SPACING);
                        }
                    }
                    
                    // Collect parents - track for ancestry but check what needs rendering
                    const parentsToRender = [];
                    p.parents.forEach(parentId => {
                        const parent = peopleMap.get(parentId);
                        if (!parent) return;
                        
                        // Always add to nextLevelPeople for ancestry tracing
                        if (!nextLevelPeople.find(np => np.id === parentId)) {
                            nextLevelPeople.push(parent);
                        }
                        
                        // Skip if already rendered as node or spouse
                        if (shownAsSpouse.has(parentId)) return;
                        if (nodes.find(n => n.id === parentId)) return;
                        
                        parentsToRender.push(parent);
                    });
                    
                    if (parentsToRender.length > 0) {
                        // Sort parents so male is always first (left), female second (right)
                        parentsToRender.sort((a, b) => {
                            if (a.gender === 'male' && b.gender === 'female') return -1;
                            if (a.gender === 'female' && b.gender === 'male') return 1;
                            return 0;
                        });
                        
                        // For couples: first parent becomes the node, second will be shown as their spouse
                        const primaryParent = parentsToRender[0];
                        const numSpouses = Math.max(getPersonSpouses(primaryParent).length, parentsToRender.length - 1);
                        const ext = getNodeVisualExtent(numSpouses);
                        
                        // Calculate the width needed for ancestors above this parent
                        // This is the key difference from before - we consider how much space ancestors will need
                        const remainingLevels = levelsUp - level;
                        const ancestorWidth = getAncestorTreeWidth(primaryParent, remainingLevels);
                        
                        // Use the larger of immediate extent or ancestor needs
                        const effectiveWidth = Math.max(ext.totalWidth, ancestorWidth);
                        const halfWidth = effectiveWidth / 2;
                        
                        familyGroups.push({
                            childX: childX,
                            parents: parentsToRender,
                            totalWidth: effectiveWidth,
                            leftExtent: halfWidth,
                            rightExtent: halfWidth,
                            leftEdge: childX - halfWidth,
                            rightEdge: childX + halfWidth
                        });
                    }
                });
                
                // Sort family groups by childX position (left to right)
                familyGroups.sort((a, b) => a.childX - b.childX);
                
                // Resolve overlaps iteratively - keep running until no overlaps remain
                // Use multiple passes to handle cascading overlaps
                let hasOverlap = true;
                let iterations = 0;
                const maxIterations = familyGroups.length * 2; // Safety limit
                
                while (hasOverlap && iterations < maxIterations) {
                    hasOverlap = false;
                    iterations++;
                    
                    for (let i = 1; i < familyGroups.length; i++) {
                        const prev = familyGroups[i - 1];
                        const curr = familyGroups[i];
                        
                        const overlap = prev.rightEdge + GAP - curr.leftEdge;
                        if (overlap > 0) {
                            hasOverlap = true;
                            // Split the movement: push left group left, right group right
                            const halfOverlap = overlap / 2;
                            
                            // Push current group right
                            curr.leftEdge += halfOverlap;
                            curr.rightEdge += halfOverlap;
                            
                            // Push previous group left
                            prev.leftEdge -= halfOverlap;
                            prev.rightEdge -= halfOverlap;
                        }
                    }
                }
                
                // Create nodes at resolved positions
                familyGroups.forEach(family => {
                    // Position primary parent centered - if they have spouses, they shift left
                    const primaryParent = family.parents[0];
                    const centerX = family.leftEdge + family.leftExtent;
                    
                    const parentNode = createPersonNode(primaryParent, centerX, y);
                    nodes.push(parentNode);
                    ancestorNodes.push(parentNode);
                    
                    // If there's a second parent not already tracked as spouse, add them as spouse
                    if (family.parents.length > 1) {
                        const secondParent = family.parents[1];
                        if (!shownAsSpouse.has(secondParent.id) && !nodes.find(n => n.id === secondParent.id)) {
                            // Check if already in spouses of first parent
                            const existingSpouses = parentNode.allSpouses || [];
                            if (!existingSpouses.find(sp => sp.id === secondParent.id)) {
                                // Add second parent as additional spouse
                                const spouseIndex = existingSpouses.length;
                                if (!parentNode.allSpouses) {
                                    parentNode.allSpouses = [];
                                }
                                parentNode.allSpouses.push({
                                    id: secondParent.id,
                                    name: secondParent.name || secondParent.nameEn || 'לא ידוע',
                                    gender: secondParent.gender,
                                    data: secondParent,
                                    order: spouseIndex,
                                    current: true
                                });
                                if (!parentNode.spouse) {
                                    parentNode.spouse = parentNode.allSpouses[0];
                                }
                                shownAsSpouse.set(secondParent.id, { hostNodeId: primaryParent.id, spouseIndex: spouseIndex });
                            }
                        }
                    }
                });
                
                return { nodes: ancestorNodes, nextLevelPeople };
            }
            
            // Helper to add descendants - positions based on subtree widths
            function addDescendantsForLevel(peopleAtLevel, level) {
                if (level > levelsDown) return [];
                
                const descendantNodes = [];
                const y = level * gapY;
                const remainingDepth = levelsDown - level;
                
                // Group children by parent
                const familyGroups = [];
                
                peopleAtLevel.forEach(p => {
                    if (!p.children || p.children.length === 0) return;
                    
                    // Find the node for this person
                    // If person is shown as a spouse box (not a main node), use the host node
                    let parentNode = nodes.find(n => n.id === p.id);
                    
                    if (!parentNode) {
                        // Check if this person is shown as a spouse box
                        const spouseInfo = shownAsSpouse.get(p.id);
                        if (spouseInfo) {
                            // Use the host node (the person they're attached to)
                            parentNode = nodes.find(n => n.id === spouseInfo.hostNodeId);
                        }
                    }
                    
                    if (!parentNode) return; // Still no node found, skip
                    
                    const familyChildren = [];
                    p.children.forEach(childId => {
                        if (nodes.find(n => n.id === childId)) return;
                        const child = peopleMap.get(childId);
                        if (!child) return;
                        familyChildren.push({ person: child, parentPerson: p });
                    });
                    
                    if (familyChildren.length > 0) {
                        // Sort children by birth date (oldest to youngest, left to right)
                        familyChildren.sort((a, b) => {
                            const dateA = parseBirthDate(a.person.birth);
                            const dateB = parseBirthDate(b.person.birth);
                            return dateA - dateB;
                        });
                        
                        // Calculate width based on subtree
                        let totalWidth = 0;
                        const childWidths = familyChildren.map(d => {
                            const w = getSubtreeWidth(d.person, remainingDepth);
                            return w;
                        });
                        
                        childWidths.forEach((w, idx) => {
                            totalWidth += w;
                            if (idx < childWidths.length - 1) totalWidth += GAP;
                        });
                        
                        familyGroups.push({
                            parentX: parentNode.x,
                            parentNode: parentNode,
                            children: familyChildren,
                            childWidths: childWidths,
                            totalWidth: totalWidth,
                            leftEdge: parentNode.x - totalWidth / 2,
                            rightEdge: parentNode.x + totalWidth / 2
                        });
                    }
                });
                
                // Sort families by parentX
                familyGroups.sort((a, b) => a.parentX - b.parentX);
                
                // Resolve overlaps
                for (let i = 1; i < familyGroups.length; i++) {
                    const prev = familyGroups[i - 1];
                    const curr = familyGroups[i];
                    
                    const overlap = prev.rightEdge + GAP - curr.leftEdge;
                    if (overlap > 0) {
                        curr.leftEdge += overlap;
                        curr.rightEdge += overlap;
                    }
                }
                
                // Create nodes at resolved positions
                familyGroups.forEach(family => {
                    let leftEdge = family.leftEdge;
                    
                    family.children.forEach((d, idx) => {
                        const w = family.childWidths[idx];
                        const centerX = leftEdge + w / 2;
                        
                        const childNode = createPersonNode(d.person, centerX, y);
                        nodes.push(childNode);
                        d.node = childNode;
                        descendantNodes.push(d);
                        
                        leftEdge += w + GAP;
                    });
                });
                
                return descendantNodes.map(d => d.node).filter(n => n);
            }
            
            // Build the tree level by level
            
            // Ensure male-left, female-right convention for focus person
            // If focus person is female with a male spouse, swap them
            let actualFocusPerson = person;
            let swappedForGenderConvention = false;
            let originalPersonSpouses = [];
            
            if (person.gender === 'female') {
                const spouses = getPersonSpouses(person);
                originalPersonSpouses = spouses; // Store original person's spouses
                // Find CURRENT male spouse (not previous spouses)
                const maleSpouse = spouses.find(sp => sp.data.gender === 'male' && sp.current);
                if (maleSpouse) {
                    // Swap: make the male spouse the focus node
                    actualFocusPerson = maleSpouse.data;
                    swappedForGenderConvention = true;
                }
            }
            
            // Level 0: Focus person (or their male spouse if swapped)
            const focusNode = createPersonNode(actualFocusPerson, 0, 0, true);
            nodes.push(focusNode);
            
            // If we swapped, replace the spouse list with the original person's spouses
            // This ensures we show the clicked person's relationships, not the swapped spouse's relationships
            if (swappedForGenderConvention) {
                // Replace focus node's spouses with the original person's spouses
                // but ensure the current male spouse (actualFocusPerson) is included
                const otherSpouses = originalPersonSpouses.filter(sp => sp.id !== actualFocusPerson.id);
                
                // Build new spouse list: original person + their other spouses
                focusNode.allSpouses = [
                    {
                        id: person.id,
                        name: person.name || person.nameEn || 'לא ידוע',
                        gender: person.gender,
                        data: person,
                        order: 0,
                        current: true
                    },
                    ...otherSpouses
                ];
                focusNode.spouse = focusNode.allSpouses[0];
                
                // Update shownAsSpouse map with correct indices
                const sortedForRender = [...focusNode.allSpouses].sort((a, b) => {
                    if (a.current && !b.current) return -1;
                    if (!a.current && b.current) return 1;
                    return (a.order ?? 0) - (b.order ?? 0);
                });
                sortedForRender.forEach((sp, idx) => {
                    shownAsSpouse.set(sp.id, { hostNodeId: actualFocusPerson.id, spouseIndex: idx });
                });
            }
            
            // Build ancestors (levels 1, 2, 3... going up)
            // Track ALL people whose ancestors we need to show (both parents at each level)
            // IMPORTANT: Include spouses in ancestry tracing - they're shown as spouse boxes but we need their ancestors too
            let currentAncestorLevel = [actualFocusPerson];
            // If we swapped, also trace from the original person
            if (swappedForGenderConvention && !currentAncestorLevel.find(p => p.id === person.id)) {
                currentAncestorLevel.push(person);
            }
            // Add focus person's spouses to ancestry tracing
            if (focusNode.allSpouses) {
                focusNode.allSpouses.forEach(sp => {
                    const spouseData = peopleMap.get(sp.id);
                    if (spouseData && !currentAncestorLevel.find(p => p.id === spouseData.id)) {
                        currentAncestorLevel.push(spouseData);
                    }
                });
            }
            
            for (let level = 1; level <= levelsUp; level++) {
                const result = addAncestorsForLevel(currentAncestorLevel, level);
                // Use nextLevelPeople (all parents) for ancestry tracing, not just rendered nodes
                currentAncestorLevel = result.nextLevelPeople;
                
                // Also add any spouses at this level to next round of tracing
                // This ensures we trace ancestors of spouse-box people at ALL levels
                result.nodes.forEach(node => {
                    if (node.allSpouses) {
                        node.allSpouses.forEach(sp => {
                            const spouseData = peopleMap.get(sp.id);
                            if (spouseData && spouseData.parents && spouseData.parents.length > 0) {
                                if (!currentAncestorLevel.find(p => p.id === spouseData.id)) {
                                    currentAncestorLevel.push(spouseData);
                                }
                            }
                        });
                    }
                });
            }
            
            // Add siblings if showing at least 1 level up
            if (levelsUp >= 1 && actualFocusPerson.parents && actualFocusPerson.parents.length > 0) {
                const allSiblingIds = new Set(actualFocusPerson.siblings || []);
                
                // Add half-siblings from parents
                actualFocusPerson.parents.forEach(parentId => {
                    const parent = peopleMap.get(parentId);
                    if (parent && parent.children) {
                        parent.children.forEach(childId => {
                            if (childId !== actualFocusPerson.id) {
                                allSiblingIds.add(childId);
                            }
                        });
                    }
                });
                
                if (allSiblingIds.size > 0) {
                    const siblingsData = Array.from(allSiblingIds).map(siblingId => {
                        const sibling = peopleMap.get(siblingId);
                        if (!sibling) return null;
                        return sibling;
                    }).filter(s => s !== null);
                    
                    // Sort siblings by birth date (oldest to youngest, left to right)
                    siblingsData.sort((a, b) => {
                        const dateA = parseBirthDate(a.birth);
                        const dateB = parseBirthDate(b.birth);
                        return dateA - dateB;
                    });
                    
                    // Use subtree width for focus person (their descendants are shown)
                    const focusWidth = getSubtreeWidth(actualFocusPerson, levelsDown);
                    
                    // Get the visual extent of the focus node (person + spouses)
                    const focusSpouses = getPersonSpouses(actualFocusPerson);
                    const focusExtent = getNodeVisualExtent(focusSpouses.length);
                    
                    // Find the position of the focus person in the sorted sibling list
                    const focusIndex = siblingsData.findIndex(s => s.id === actualFocusPerson.id);
                    
                    // Calculate where to start positioning siblings
                    // Focus person is at X=0, need to account for actual visual width (not subtree)
                    // The visual extent tells us how far left and right from X=0 the node extends
                    let leftmostEdge = -focusExtent.leftExtent - GAP;
                    
                    if (focusIndex > 0) {
                        // There are older siblings - position them to the left
                        // Start from focus person's left edge, work backwards
                        let olderSiblingEdge = leftmostEdge;
                        
                        for (let i = focusIndex - 1; i >= 0; i--) {
                            const olderSibling = siblingsData[i];
                            if (nodes.find(n => n.id === olderSibling.id)) continue;
                            if (swappedForGenderConvention && olderSibling.id === person.id) continue;
                            
                            const siblingSpouses = getPersonSpouses(olderSibling);
                            const sibExtent = getNodeVisualExtent(siblingSpouses.length);
                            
                            // Position this sibling to the left, accounting for its right extent
                            const sibCenterX = olderSiblingEdge - sibExtent.rightExtent;
                            const siblingNode = createPersonNode(olderSibling, sibCenterX, 0);
                            nodes.push(siblingNode);
                            
                            // Move edge further left for next older sibling
                            olderSiblingEdge = sibCenterX - sibExtent.leftExtent - GAP;
                        }
                    }
                    
                    // Position younger siblings (to the right of focus person)
                    if (focusIndex >= 0 && focusIndex < siblingsData.length - 1) {
                        let youngerSiblingEdge = focusExtent.rightExtent + GAP;
                        
                        for (let i = focusIndex + 1; i < siblingsData.length; i++) {
                            const youngerSibling = siblingsData[i];
                            if (nodes.find(n => n.id === youngerSibling.id)) continue;
                            if (swappedForGenderConvention && youngerSibling.id === person.id) continue;
                            
                            const siblingSpouses = getPersonSpouses(youngerSibling);
                            const sibExtent = getNodeVisualExtent(siblingSpouses.length);
                            
                            // Position this sibling to the right, accounting for its left extent
                            const sibCenterX = youngerSiblingEdge + sibExtent.leftExtent;
                            const siblingNode = createPersonNode(youngerSibling, sibCenterX, 0);
                            nodes.push(siblingNode);
                            
                            // Move edge further right for next younger sibling
                            youngerSiblingEdge = sibCenterX + sibExtent.rightExtent + GAP;
                        }
                    }
                }
            }
            
            // Build descendants (levels 1, 2, 3... going down)
            // IMPORTANT: Always use the ORIGINAL clicked person for descendants
            // Even if we swapped for gender convention, descendants should be from the person the user clicked
            let currentDescendantLevel = [person];
            for (let level = 1; level <= levelsDown; level++) {
                const descendantNodes = addDescendantsForLevel(currentDescendantLevel, level);
                currentDescendantLevel = descendantNodes.map(n => n.data);
            }
            
            // Create links between all parent-child pairs in the tree
            nodes.forEach(node => {
                const p = node.data;
                if (p.parents && p.parents.length > 0) {
                    p.parents.forEach(parentId => {
                        const parentNode = nodes.find(n => n.id === parentId);
                        if (parentNode) {
                            // Check if link already exists
                            const exists = links.find(l => l.source.id === parentId && l.target.id === node.id);
                            if (!exists) {
                                links.push({
                                    source: parentNode,
                                    target: node,
                                    childOtherParentId: p.parents.find(pid => pid !== parentId)
                                });
                            }
                        } else if (shownAsSpouse.has(parentId)) {
                            // Parent is shown as a spouse box, create link to spouse box
                            const spouseInfo = shownAsSpouse.get(parentId);
                            const hostNode = nodes.find(n => n.id === spouseInfo.hostNodeId);
                            if (hostNode) {
                                // Check if link already exists
                                const exists = links.find(l => 
                                    l.source.id === spouseInfo.hostNodeId && 
                                    l.target.id === node.id && 
                                    l.fromSpouseBox === true &&
                                    l.spouseId === parentId
                                );
                                if (!exists) {
                                    links.push({
                                        source: hostNode,
                                        target: node,
                                        fromSpouseBox: true,
                                        spouseId: parentId,
                                        spouseIndex: spouseInfo.spouseIndex,
                                        childOtherParentId: p.parents.find(pid => pid !== parentId)
                                    });
                                }
                            }
                        }
                    });
                }
            });
            
            // Create links from ancestor nodes to people shown as spouse boxes
            // This handles cases like Aaron Karfunkel -> Therese (who is shown as spouse of Max)
            shownAsSpouse.forEach((spouseInfo, spouseId) => {
                const spousePerson = peopleMap.get(spouseId);
                if (!spousePerson || !spousePerson.parents) return;
                
                spousePerson.parents.forEach(parentId => {
                    const parentNode = nodes.find(n => n.id === parentId);
                    if (parentNode) {
                        // Create a special link that targets a spouse box
                        const hostNode = nodes.find(n => n.id === spouseInfo.hostNodeId);
                        if (hostNode) {
                            links.push({
                                source: parentNode,
                                target: hostNode, // The node the spouse is attached to
                                toSpouseBox: true,
                                spouseId: spouseId,
                                spouseIndex: spouseInfo.spouseIndex,
                                childOtherParentId: spousePerson.parents.find(pid => pid !== parentId)
                            });
                        }
                    }
                });
            });
            
            return { nodes, links, shownAsSpouse };
        }

        // Cache for loaded profiles
        const profileCache = new Map();
        
        async function loadProfile(person) {
            if (!person.profileFile) return null;
            if (profileCache.has(person.id)) return profileCache.get(person.id);
            
            const profilePath = `assets/data/profiles/${person.profileFile}.json`;

            // Try local first, then fall back to BASE_URL
            try {
                const localResponse = await fetch(profilePath);
                if (localResponse.ok) {
                    const profile = await localResponse.json();
                    profileBaseUrls.set(person.id, '');
                    profileCache.set(person.id, profile);
                    return profile;
                }
            } catch (e) { /* local not available */ }

            try {
                const remoteResponse = await fetch(`${BASE_URL}${profilePath}`);
                if (!remoteResponse.ok) return null;
                const profile = await remoteResponse.json();
                profileBaseUrls.set(person.id, BASE_URL);
                profileCache.set(person.id, profile);
                return profile;
            } catch (error) {
                return null;
            }
        }
