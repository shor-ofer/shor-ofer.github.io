        async function renderTree(personId, options = {}) {
            const layoutData = buildFamilyLayout(personId);
            if (!layoutData) {
                console.error('Could not build layout for person:', personId);
                return;
            }
            
            currentRoot = personId;
            // Capture zoom state before clearing SVG (for preserveZoom)
            const savedTransform = options.preserveZoom ? d3.zoomTransform(svg.node()) : null;
            // Find the actual focus node (might be swapped for gender convention)
            const actualFocusNode = options.preserveZoom ? layoutData.nodes.find(n => n.isFocus) : null;
            
            // Load profiles for all visible nodes to get avatars
            const profilePromises = layoutData.nodes.map(async node => {
                const profile = await loadProfile(node.data);
                if (profile && profile.avatar) {
                    node.avatar = resolveUrl(profile.avatar, node.data.id);
                }
                // Also load for spouses
                if (node.allSpouses) {
                    await Promise.all(node.allSpouses.map(async sp => {
                        const spProfile = await loadProfile(sp.data);
                        if (spProfile && spProfile.avatar) {
                            sp.avatar = resolveUrl(spProfile.avatar, sp.data.id);
                        }
                    }));
                }
            });
            await Promise.all(profilePromises);
            
            // Clear previous
            g.selectAll("*").remove();
            
            // Add links (straight lines connecting family members)
            const linkGroup = g.append("g")
                .attr("fill", "none")
                .attr("stroke-width", 2);
            
            // Extract config values for readability
            const { CHILD_SPOUSE_OFFSET, PERSON_SHIFT, BOX_WIDTH, BOX_HEIGHT, HALF_BOX_WIDTH, SPOUSE_SPACING, SPOUSE_FIRST_OFFSET } = CONFIG;
            const { SIBLING_BAR_SPACING, OLD_SPOUSE_BASE_OFFSET, OLD_SPOUSE_SPACING, CURRENT_SPOUSE_GAP, CURRENT_SPOUSE_SPACING, STEP_X_BASE, STEP_X_INCREMENT, STEP_Y_BASE, STEP_Y_INCREMENT } = CONFIG.LINKS;

            // Helper to get renderIndex for a link (0=current spouse, 1+=old spouses)
            function getRenderIndex(link) {
                // For links from spouse boxes, use the spouse's relationships, not the host node's
                if (link.fromSpouseBox) {
                    const spousePerson = peopleMap.get(link.spouseId);
                    if (!spousePerson || !link.childOtherParentId) return 0;
                    
                    const spousePartners = getPersonSpouses(spousePerson);
                    if (spousePartners.length === 0) return 0;
                    
                    const partnerIndex = spousePartners.findIndex(s => s.id === link.childOtherParentId);
                    if (partnerIndex < 0) return 0;
                    
                    const matchedPartner = spousePartners[partnerIndex];
                    const sortedPartners = [...spousePartners].sort((a, b) => {
                        if (a.current && !b.current) return -1;
                        if (!a.current && b.current) return 1;
                        return (a.order ?? 0) - (b.order ?? 0);
                    });
                    return sortedPartners.findIndex(s => s.id === matchedPartner.id);
                }
                
                // Regular link from a node
                if (!link.source.allSpouses || link.source.allSpouses.length === 0 || !link.childOtherParentId) {
                    return 0;
                }
                const spouseIndex = link.source.allSpouses.findIndex(s => s.id === link.childOtherParentId);
                if (spouseIndex < 0) return 0;
                
                const matchedSpouse = link.source.allSpouses[spouseIndex];
                const sortedSpouses = [...link.source.allSpouses].sort((a, b) => {
                    if (a.current && !b.current) return -1;
                    if (!a.current && b.current) return 1;
                    return (a.order ?? 0) - (b.order ?? 0);
                });
                return sortedSpouses.findIndex(s => s.id === matchedSpouse.id);
            }
            
            // ===== NEW CLEAN FAMILY RENDERING =====
            // Group links by normalized family key (parent pair)
            const familyLinkGroups = new Map();
            layoutData.links.forEach(link => {
                const parentId = link.fromSpouseBox ? link.spouseId : link.source.id;
                const spouseId = link.childOtherParentId || 'none';
                
                // Normalize key: sort parent IDs
                let normalizedKey;
                if (spouseId === 'none') {
                    normalizedKey = `${parentId}_${spouseId}`;
                } else {
                    const sortedParents = [parentId, spouseId].sort((a, b) => a - b);
                    normalizedKey = `${sortedParents[0]}_${sortedParents[1]}`;
                }
                
                if (!familyLinkGroups.has(normalizedKey)) {
                    familyLinkGroups.set(normalizedKey, {
                        parent1Id: spouseId === 'none' ? parentId : Math.min(parentId, spouseId),
                        parent2Id: spouseId === 'none' ? 'none' : Math.max(parentId, spouseId),
                        parent1Pos: null,
                        parent2Pos: null,
                        children: [],
                        renderIndex: null,
                        childrenBarY: null
                    });
                }
                
                const family = familyLinkGroups.get(normalizedKey);
                
                // Add child (avoid duplicates)
                if (!family.children.find(c => c.target.id === link.target.id)) {
                    family.children.push(link);
                }
                
                // Get render index for this family
                const renderIndex = getRenderIndex(link);
                if (family.renderIndex === null) {
                    family.renderIndex = renderIndex;
                }
            });
            
            // For each family, fill in parent positions and barY
            familyLinkGroups.forEach((family, familyKey) => {
                // Always look up both parent positions from nodes/spouse boxes
                
                // Fill in parent 1 position
                if (family.parent1Id !== 'none') {
                    const parent1Node = layoutData.nodes.find(n => n.id === family.parent1Id);
                    if (parent1Node) {
                        // If person has spouse boxes, their actual render position is shifted left
                        const xOffset = parent1Node.spouse ? -PERSON_SHIFT : 0;
                        family.parent1Pos = {
                            x: parent1Node.x + xOffset,
                            y: parent1Node.y
                        };
                    } else {
                        // Check if parent1 is shown as a spouse box
                        const spouseInfo = Array.from(layoutData.shownAsSpouse.entries()).find(([id]) => id === family.parent1Id);
                        if (spouseInfo) {
                            const [spouseId, info] = spouseInfo;
                            const hostNode = layoutData.nodes.find(n => n.id === info.hostNodeId);
                            if (hostNode) {
                                family.parent1Pos = {
                                    x: hostNode.x + SPOUSE_FIRST_OFFSET + (info.spouseIndex * SPOUSE_SPACING),
                                    y: hostNode.y
                                };
                            }
                        }
                    }
                }
                
                // Fill in parent 2 position
                if (family.parent2Id !== 'none') {
                    const parent2Node = layoutData.nodes.find(n => n.id === family.parent2Id);
                    if (parent2Node) {
                        // If person has spouse boxes, their actual render position is shifted left
                        const xOffset = parent2Node.spouse ? -PERSON_SHIFT : 0;
                        family.parent2Pos = {
                            x: parent2Node.x + xOffset,
                            y: parent2Node.y
                        };
                    } else {
                        // Check if parent2 is shown as a spouse box
                        const spouseInfo = Array.from(layoutData.shownAsSpouse.entries()).find(([id]) => id === family.parent2Id);
                        if (spouseInfo) {
                            const [spouseId, info] = spouseInfo;
                            const hostNode = layoutData.nodes.find(n => n.id === info.hostNodeId);
                            if (hostNode) {
                                family.parent2Pos = {
                                    x: hostNode.x + SPOUSE_FIRST_OFFSET + (info.spouseIndex * SPOUSE_SPACING),
                                    y: hostNode.y
                                };
                            }
                        }
                    }
                }
                
                // Compute childrenBarY - aligns with existing spouse connection lines
                // (node rendering already draws horizontal/stepped lines between spouses)
                if (family.parent1Pos) {
                    const parentY = family.parent1Pos.y;
                    const renderIndex = family.renderIndex || 0;
                    
                    if (renderIndex > 0) {
                        // Former spouse: the stepped line is at this Y level
                        const downDistance = 40 + (renderIndex * SIBLING_BAR_SPACING);
                        family.childrenBarY = parentY + CONFIG.BOX_HEIGHT / 2 + downDistance;
                    } else {
                        // Current spouse: bottom of parent boxes
                        family.childrenBarY = parentY + CONFIG.BOX_HEIGHT / 2;
                    }
                }
            });
            
            // Draw connection paths for families
            const familyPaths = [];
            familyLinkGroups.forEach((family, familyKey) => {
                const renderIndex = family.renderIndex || 0;
                const familyBarY = family.childrenBarY;
                
                // Skip if missing essential data
                if (!familyBarY || !family.parent1Pos) {
                    console.warn('Skipping family due to missing data:', {
                        key: familyKey,
                        parent1Id: family.parent1Id,
                        parent2Id: family.parent2Id,
                        hasBarY: !!familyBarY,
                        hasParent1Pos: !!family.parent1Pos,
                        hasParent2Pos: !!family.parent2Pos
                    });
                    return;
                }
                
                const hasCouple = family.parent2Id !== 'none' && family.parent2Pos;
                
                if (hasCouple) {
                    const x1 = family.parent1Pos.x;
                    const x2 = family.parent2Pos.x;
                    const centerX = (x1 + x2) / 2;
                    
                    // Spouse connection lines are already drawn at node level.
                    // We only draw: center-drop, child-bus, child-drops.
                    
                    // Calculate min/max X of all children
                    const childXPositions = family.children.map(link => {
                        if (link.toSpouseBox) {
                            return link.target.x + SPOUSE_FIRST_OFFSET + (link.spouseIndex * SPOUSE_SPACING);
                        } else {
                            return link.target.spouse ? link.target.x - CHILD_SPOUSE_OFFSET : link.target.x;
                        }
                    });
                    
                    if (childXPositions.length > 0) {
                        // Bus must span from center-drop to all children positions
                        const busMinX = Math.min(centerX, ...childXPositions);
                        const busMaxX = Math.max(centerX, ...childXPositions);
                        // For former spouses: child bus merges with the U-shape line (same Y)
                        // For current spouse: 20px gap below parent boxes
                        const childBusY = renderIndex > 0 ? familyBarY : familyBarY + 20;
                        
                        // Vertical drop from center of couple connection to children bus
                        if (childBusY > familyBarY) {
                            familyPaths.push({
                                type: 'center-drop',
                                d: `M${centerX},${familyBarY} L${centerX},${childBusY}`,
                                renderIndex: renderIndex
                            });
                        }
                        
                        // Horizontal bus connecting center-drop to all children
                        familyPaths.push({
                            type: 'child-bus',
                            d: `M${busMinX},${childBusY} L${busMaxX},${childBusY}`,
                            renderIndex: renderIndex
                        });
                        
                        // Vertical lines from bus to each child
                        family.children.forEach(link => {
                            let targetX, targetY;
                            if (link.toSpouseBox) {
                                targetX = link.target.x + SPOUSE_FIRST_OFFSET + (link.spouseIndex * SPOUSE_SPACING);
                                targetY = link.target.y - CONFIG.BOX_HEIGHT / 2;
                            } else {
                                targetX = link.target.spouse ? link.target.x - CHILD_SPOUSE_OFFSET : link.target.x;
                                targetY = link.target.y - CONFIG.BOX_HEIGHT / 2;
                            }
                            
                            familyPaths.push({
                                type: 'child-drop',
                                d: `M${targetX},${childBusY} L${targetX},${targetY}`,
                                renderIndex: renderIndex
                            });
                        });
                    }
                } else {
                    // Single parent
                    const parentX = family.parent1Pos.x;
                    const parentY = family.parent1Pos.y + CONFIG.BOX_HEIGHT / 2;
                    
                    // Calculate child positions
                    const childXPositions = family.children.map(link => {
                        if (link.toSpouseBox) {
                            return link.target.x + SPOUSE_FIRST_OFFSET + (link.spouseIndex * SPOUSE_SPACING);
                        } else {
                            return link.target.spouse ? link.target.x - CHILD_SPOUSE_OFFSET : link.target.x;
                        }
                    });
                    
                    if (childXPositions.length > 0) {
                        // Bus must span from parent-drop to all children positions
                        const busMinX = Math.min(parentX, ...childXPositions);
                        const busMaxX = Math.max(parentX, ...childXPositions);
                        const childBusY = familyBarY + 20;
                        
                        // Vertical drop from parent
                        familyPaths.push({
                            type: 'parent-drop',
                            d: `M${parentX},${parentY} L${parentX},${childBusY}`,
                            renderIndex: renderIndex
                        });
                        
                        // Horizontal bus connecting parent-drop to all children
                        familyPaths.push({
                            type: 'child-bus',
                            d: `M${busMinX},${childBusY} L${busMaxX},${childBusY}`,
                            renderIndex: renderIndex
                        });
                        
                        // Vertical drops to each child
                        family.children.forEach(link => {
                            let targetX, targetY;
                            if (link.toSpouseBox) {
                                targetX = link.target.x + SPOUSE_FIRST_OFFSET + (link.spouseIndex * SPOUSE_SPACING);
                                targetY = link.target.y - CONFIG.BOX_HEIGHT / 2;
                            } else {
                                targetX = link.target.spouse ? link.target.x - CHILD_SPOUSE_OFFSET : link.target.x;
                                targetY = link.target.y - CONFIG.BOX_HEIGHT / 2;
                            }
                            
                            familyPaths.push({
                                type: 'child-drop',
                                d: `M${targetX},${childBusY} L${targetX},${targetY}`,
                                renderIndex: renderIndex  // Match parent relationship style
                            });
                        });
                    }
                }
            });
            
            linkGroup.selectAll(".family-path")
                .data(familyPaths)
                .join("path")
                .attr("class", d => `family-path ${d.type}`)
                .attr("stroke", d => {
                    const renderIndex = d.renderIndex || 0;
                    if (renderIndex > 0) {
                        return `rgba(156, 194, 255, ${0.35 - renderIndex * 0.05})`;
                    }
                    return "rgba(156, 194, 255, 0.5)";
                })
                .attr("stroke-dasharray", d => {
                    const renderIndex = d.renderIndex || 0;
                    if (renderIndex > 0) {
                        return renderIndex === 1 ? '5,3' : renderIndex === 2 ? '8,4,2,4' : '2,2';
                    }
                    return null;
                })
                .attr("stroke-width", 2)
                .attr("fill", "none")
                .attr("d", d => d.d);
            
            // Add nodes
            const node = g.append("g")
                .selectAll("g")
                .data(layoutData.nodes)
                .join("g")
                .attr("class", "node-group")
                .attr("transform", d => `translate(${d.x},${d.y})`);
            
            // Draw primary person
            node.append("g")
                .attr("class", d => `node ${d.gender || ''} ${d.isFocus ? 'focus' : ''}`)
                .attr("transform", d => d.spouse ? `translate(-${PERSON_SHIFT},0)` : "translate(0,0)")
                .style("cursor", "pointer")
                .on("click", (event, d) => {
                    event.stopPropagation();
                    const displayPerson = window.searchablePeople.find(p => p.id === d.id);
                    if (displayPerson) setSearchValue(displayPerson.displayName);
                    
                    // Add to navigation history
                    addToHistory(d.id);
                    
                    if (isMobilePhone()) {
                        if (mobileSelectedId === d.id) {
                            // Re-tap on same person → open profile
                            showPersonDetails(d.id);
                        } else {
                            // New person → switch tree, center, no profile
                            mobileSelectedId = d.id;
                            renderTree(d.id, { preserveZoom: true });
                        }
                    } else {
                        showPersonDetails(d.id);
                        renderTree(d.id, { preserveZoom: true });
                    }
                })
                .call(person => {
                    person.append("rect")
                        .attr("width", BOX_WIDTH)
                        .attr("height", BOX_HEIGHT)
                        .attr("x", -HALF_BOX_WIDTH)
                        .attr("y", -BOX_HEIGHT / 2);
                    
                    // Add avatar if available
                    person.filter(d => d.avatar).each(function(d) {
                        const g = d3.select(this);
                        const avatarSize = 30;
                        const clipId = `avatar-clip-${d.id}`;
                        const margin = 3;
                        
                        // Create circular clip path (upper right corner)
                        g.append("clipPath")
                            .attr("id", clipId)
                            .append("circle")
                            .attr("cx", HALF_BOX_WIDTH - avatarSize / 2 - margin)
                            .attr("cy", -BOX_HEIGHT / 2 + avatarSize / 2 + margin)
                            .attr("r", avatarSize / 2);
                        
                        // Add avatar image
                        g.append("image")
                            .attr("xlink:href", d.avatar)
                            .attr("x", HALF_BOX_WIDTH - avatarSize - margin)
                            .attr("y", -BOX_HEIGHT / 2 + margin)
                            .attr("width", avatarSize)
                            .attr("height", avatarSize)
                            .attr("clip-path", `url(#${clipId})`);
                    });
                    
                    // Simple name wrapping
                    person.each(function(d) {
                        let fullName = getPersonName(d.data);
                        // Add nickname if available
                        const nickname = currentLanguage === 'en' ? (d.data.nicknameEn || d.data.nickname) : d.data.nickname;
                        if (nickname) {
                            fullName = `${fullName} (${nickname})`;
                        }
                        const words = fullName.split(/\s+/);
                        const g = d3.select(this);
                        
                        // If name is short, display on one line
                        if (fullName.length <= 12 || (words.length === 1 && fullName.length <= 16)) {
                            const fontSize = fullName.length > 14 ? "10px" : "11px";
                            
                            // Dark stroke outline for readability
                            const strokeText = g.append("text")
                                .attr("y", -5)
                                .attr("text-anchor", "middle")
                                .style("font-size", fontSize)
                                .style("font-weight", "600")
                                .style("stroke", "rgba(26, 31, 54, 0.9)")
                                .style("stroke-width", "4")
                                .style("fill", "none");
                            strokeText.append("tspan")
                                .attr("x", 0)
                                .text(fullName);
                            
                            // Main text
                            const text = g.append("text")
                                .attr("y", -5)
                                .attr("text-anchor", "middle")
                                .style("font-size", fontSize)
                                .style("font-weight", "600")
                                .style("fill", "#e8eefc");
                            text.append("tspan")
                                .attr("x", 0)
                                .text(fullName);
                        } else {
                            // Split into 2 lines at midpoint
                            const midpoint = Math.ceil(words.length / 2);
                            const line1 = words.slice(0, midpoint).join(' ');
                            const line2 = words.slice(midpoint).join(' ');
                            const maxLineLength = Math.max(line1.length, line2.length);
                            const fontSize = maxLineLength > 14 ? "10px" : "11px";
                            
                            // Dark stroke outline - line 1
                            g.append("text")
                                .attr("y", -10)
                                .attr("x", 0)
                                .attr("text-anchor", "middle")
                                .style("font-size", fontSize)
                                .style("font-weight", "600")
                                .style("stroke", "rgba(26, 31, 54, 0.9)")
                                .style("stroke-width", "4")
                                .style("fill", "none")
                                .text(line1);
                            
                            // Dark stroke outline - line 2
                            g.append("text")
                                .attr("y", 2)
                                .attr("x", 0)
                                .attr("text-anchor", "middle")
                                .style("font-size", fontSize)
                                .style("font-weight", "600")
                                .style("stroke", "rgba(26, 31, 54, 0.9)")
                                .style("stroke-width", "4")
                                .style("fill", "none")
                                .text(line2);
                            
                            // Main text - line 1
                            g.append("text")
                                .attr("y", -10)
                                .attr("x", 0)
                                .attr("text-anchor", "middle")
                                .style("font-size", fontSize)
                                .style("font-weight", "600")
                                .style("fill", "#e8eefc")
                                .text(line1);
                            
                            // Main text - line 2
                            g.append("text")
                                .attr("y", 2)
                                .attr("x", 0)
                                .attr("text-anchor", "middle")
                                .style("font-size", fontSize)
                                .style("font-weight", "600")
                                .style("fill", "#e8eefc")
                                .text(line2);
                        }
                    });
                    
                    person.append("text")
                        .attr("dy", "1.8em")
                        .attr("text-anchor", "middle")
                        .attr("direction", "ltr")
                        .attr("unicode-bidi", "embed")
                        .text(d => {
                            const birth = getYearOnly(d.data.birth);
                            const death = getYearOnly(d.data.death);
                            if (birth && death) return `${birth} - ${death}`;
                            if (birth) return `${birth}`;
                            if (death) return `- ${death}`;
                            return '';
                        })
                        .style("font-size", "9px")
                        .style("fill", "rgba(232, 238, 252, 0.7)")
                        .style("direction", "ltr")
                        .style("unicode-bidi", "bidi-override")
                        .call(text => text.clone(true).lower()
                            .attr("stroke", "rgba(26, 31, 54, 0.8)")
                            .attr("stroke-width", 2));
                    
                });
            
            // Draw all spouses (current and previous) with faded colors for previous
            node.filter(d => d.allSpouses && d.allSpouses.length > 0)
                .each(function(d) {
                    const nodeGroup = d3.select(this);
                    const spouses = d.allSpouses;
                    const sortedSpouses = [...spouses].sort((a, b) => {
                        if (a.current && !b.current) return -1;
                        if (!a.current && b.current) return 1;
                        return (a.order ?? 0) - (b.order ?? 0);
                    });
                    
                    const totalSpouses = sortedSpouses.length;
                    
                    sortedSpouses.forEach((sp, idx) => {
                        const xOffset = SPOUSE_FIRST_OFFSET + (idx * SPOUSE_SPACING);
                        const isCurrent = sp.current;
                        
                        // Color gradient: current spouse = lighter blue, older spouses get more transparent
                        const lineColor = idx === 0 ? 'rgba(156, 194, 255, 0.5)' : `rgba(156, 194, 255, ${0.3 - idx * 0.05})`;
                        const lineStyle = idx === 0 ? 'solid' : 'dashed';
                        
                        const spouseGroup = nodeGroup.append("g")
                            .attr("class", `node ${sp.gender || ''} ${isCurrent ? '' : 'previous-spouse'}`)
                            .attr("transform", `translate(${xOffset},0)`)
                            .style("cursor", "pointer")
                            .on("click", (event) => {
                                event.stopPropagation();
                                const displayPerson = window.searchablePeople.find(p => p.id === sp.id);
                                if (displayPerson) setSearchValue(displayPerson.displayName);
                                
                                // Add to navigation history
                                addToHistory(sp.id);
                                
                                if (isMobilePhone()) {
                                    if (mobileSelectedId === sp.id) {
                                        showPersonDetails(sp.id);
                                    } else {
                                        mobileSelectedId = sp.id;
                                        renderTree(sp.id, { preserveZoom: true });
                                    }
                                } else {
                                    showPersonDetails(sp.id);
                                    renderTree(sp.id, { preserveZoom: true });
                                }
                            });
                        
                        spouseGroup.append("rect")
                            .attr("width", BOX_WIDTH)
                            .attr("height", BOX_HEIGHT)
                            .attr("x", -HALF_BOX_WIDTH)
                            .attr("y", -BOX_HEIGHT / 2);
                        
                        // Add avatar if available for spouse
                        if (sp.avatar) {
                            const avatarSize = 30;
                            const clipId = `avatar-clip-spouse-${sp.id}-${idx}`;
                            const margin = 3;
                            
                            // Create circular clip path (upper right corner)
                            spouseGroup.append("clipPath")
                                .attr("id", clipId)
                                .append("circle")
                                .attr("cx", HALF_BOX_WIDTH - avatarSize / 2 - margin)
                                .attr("cy", -BOX_HEIGHT / 2 + avatarSize / 2 + margin)
                                .attr("r", avatarSize / 2);
                            
                            // Add avatar image
                            spouseGroup.append("image")
                                .attr("xlink:href", sp.avatar)
                                .attr("x", HALF_BOX_WIDTH - avatarSize - margin)
                                .attr("y", -BOX_HEIGHT / 2 + margin)
                                .attr("width", avatarSize)
                                .attr("height", avatarSize)
                                .attr("clip-path", `url(#${clipId})`);
                        }
                        
                        // Name rendering for spouse
                        let fullName = getPersonName(sp.data);
                        // Add nickname if available
                        const nickname = currentLanguage === 'en' ? (sp.data.nicknameEn || sp.data.nickname) : sp.data.nickname;
                        if (nickname) {
                            fullName = `${fullName} (${nickname})`;
                        }
                        const words = fullName.split(/\s+/);
                        
                        if (fullName.length <= 12 || (words.length === 1 && fullName.length <= 16)) {
                            const fontSize = fullName.length > 14 ? "10px" : "11px";
                            
                            // Dark stroke outline
                            const strokeText = spouseGroup.append("text")
                                .attr("y", -5)
                                .attr("text-anchor", "middle")
                                .style("font-size", fontSize)
                                .style("font-weight", "600")
                                .style("stroke", "rgba(26, 31, 54, 0.9)")
                                .style("stroke-width", "4")
                                .style("fill", "none");
                            strokeText.append("tspan")
                                .attr("x", 0)
                                .text(fullName);
                            
                            // Main text
                            const text = spouseGroup.append("text")
                                .attr("y", -5)
                                .attr("text-anchor", "middle")
                                .style("font-size", fontSize)
                                .style("font-weight", "600")
                                .style("fill", "#e8eefc");
                            text.append("tspan")
                                .attr("x", 0)
                                .text(fullName);
                        } else {
                            const midpoint = Math.ceil(words.length / 2);
                            const line1 = words.slice(0, midpoint).join(' ');
                            const line2 = words.slice(midpoint).join(' ');
                            
                            const maxLineLength = Math.max(line1.length, line2.length);
                            const fontSize = maxLineLength > 14 ? "10px" : "11px";
                            
                            // Dark stroke outline - line 1
                            spouseGroup.append("text")
                                .attr("y", -10)
                                .attr("x", 0)
                                .attr("text-anchor", "middle")
                                .style("font-size", fontSize)
                                .style("font-weight", "600")
                                .style("stroke", "rgba(26, 31, 54, 0.9)")
                                .style("stroke-width", "4")
                                .style("fill", "none")
                                .text(line1);
                            
                            // Dark stroke outline - line 2
                            spouseGroup.append("text")
                                .attr("y", 2)
                                .attr("x", 0)
                                .attr("text-anchor", "middle")
                                .style("font-size", fontSize)
                                .style("font-weight", "600")
                                .style("stroke", "rgba(26, 31, 54, 0.9)")
                                .style("stroke-width", "4")
                                .style("fill", "none")
                                .text(line2);
                            
                            // Main text - line 1
                            spouseGroup.append("text")
                                .attr("y", -10)
                                .attr("x", 0)
                                .attr("text-anchor", "middle")
                                .style("font-size", fontSize)
                                .style("font-weight", "600")
                                .style("fill", "#e8eefc")
                                .text(line1);
                            
                            // Main text - line 2
                            spouseGroup.append("text")
                                .attr("y", 2)
                                .attr("x", 0)
                                .attr("text-anchor", "middle")
                                .style("font-size", fontSize)
                                .style("font-weight", "600")
                                .style("fill", "#e8eefc")
                                .text(line2);
                        }
                        
                        // Dates for spouse
                        const birth = getYearOnly(sp.data.birth);
                        const death = getYearOnly(sp.data.death);
                        let dateText = '';
                        if (birth && death) dateText = `${birth} - ${death}`;
                        else if (birth) dateText = `${birth}`;
                        else if (death) dateText = `- ${death}`;
                        
                        if (dateText) {
                            spouseGroup.append("text")
                                .attr("dy", "1.8em")
                                .attr("text-anchor", "middle")
                                .attr("direction", "ltr")
                                .attr("unicode-bidi", "embed")
                                .text(dateText)
                                .style("font-size", "9px")
                                .style("fill", "rgba(232, 238, 252, 0.7)")
                                .style("direction", "ltr")
                                .style("unicode-bidi", "bidi-override")
                                .call(text => text.clone(true).lower()
                                    .attr("stroke", "rgba(26, 31, 54, 0.8)")
                                    .attr("stroke-width", 2));
                        }
                        
                        // Connection line to this spouse
                        if (idx === 0) {
                            // Current spouse: normal horizontal line at top level
                            // Person is at -PERSON_SHIFT, so right edge is -PERSON_SHIFT + HALF_BOX_WIDTH
                            const personRightEdge = -PERSON_SHIFT + HALF_BOX_WIDTH;
                            nodeGroup.append("line")
                                .attr("x1", personRightEdge)
                                .attr("y1", 0)
                                .attr("x2", xOffset - HALF_BOX_WIDTH)
                                .attr("y2", 0)
                                .attr("stroke", lineColor)
                                .attr("stroke-width", 2);
                        } else {
                            // Previous spouses: stepped lines from bottom of PERSON box
                            const stepIndex = idx;
                            const personRightEdge = -PERSON_SHIFT + HALF_BOX_WIDTH;
                            const startX = personRightEdge - (stepIndex * 25);
                            const downDistance = 40 + (stepIndex * SIBLING_BAR_SPACING);
                            const dashPattern = stepIndex === 1 ? '5,3' : stepIndex === 2 ? '8,4,2,4' : '2,2';
                            const halfHeight = BOX_HEIGHT / 2;
                            
                            // Line segment 1: Down from person box
                            nodeGroup.append("line")
                                .attr("x1", startX)
                                .attr("y1", halfHeight)
                                .attr("x2", startX)
                                .attr("y2", halfHeight + downDistance)
                                .attr("stroke", lineColor)
                                .attr("stroke-width", 1.5)
                                .attr("stroke-dasharray", dashPattern);
                            
                            // Line segment 2: Horizontal to old spouse center
                            nodeGroup.append("line")
                                .attr("x1", startX)
                                .attr("y1", halfHeight + downDistance)
                                .attr("x2", xOffset)
                                .attr("y2", halfHeight + downDistance)
                                .attr("stroke", lineColor)
                                .attr("stroke-width", 1.5)
                                .attr("stroke-dasharray", dashPattern);
                            
                            // Line segment 3: Up to old spouse box
                            nodeGroup.append("line")
                                .attr("x1", xOffset)
                                .attr("y1", halfHeight + downDistance)
                                .attr("x2", xOffset)
                                .attr("y2", halfHeight)
                                .attr("stroke", lineColor)
                                .attr("stroke-width", 1.5)
                                .attr("stroke-dasharray", dashPattern);
                        }
                    });
                });
            
            // Center the tree
            const container = document.getElementById('tree-container');
            const width = container.clientWidth;
            const fullHeight = container.clientHeight;

            if (options.preserveZoom && savedTransform && actualFocusNode) {
                // Keep current zoom scale, just re-center on the focus person with smooth pan
                const scale = savedTransform.k;
                const translateX = width / 2 - actualFocusNode.x * scale;
                const translateY = fullHeight / 2 - actualFocusNode.y * scale;
                svg.transition()
                    .duration(750)
                    .ease(d3.easeCubicInOut)
                    .call(zoom.transform, d3.zoomIdentity.translate(translateX, translateY).scale(scale));
            } else {
                const bounds = g.node().getBBox();
                const scale = Math.min(
                    width / (bounds.width + 100),
                    fullHeight / (bounds.height + 100),
                    1
                );
                const translateX = (width - bounds.width * scale) / 2 - bounds.x * scale;
                const translateY = (fullHeight - bounds.height * scale) / 2 - bounds.y * scale;
                svg.transition()
                    .duration(750)
                    .ease(d3.easeCubicInOut)
                    .call(zoom.transform, d3.zoomIdentity.translate(translateX, translateY).scale(scale));
            }

            // On mobile: add ⓘ badge to the focus node so user can tap to open profile
            if (isMobilePhone()) {
                // Remove any existing badge first
                g.selectAll('.mobile-info-badge').remove();
                // Find the focus node group (the one with isFocus flag)
                const focusGroup = g.selectAll('.node-group').filter(d => d.isFocus);
                focusGroup.each(function(d) {
                    const nodeEl = d3.select(this);
                    // Shift accounts for spouse layout
                    const xShift = d.spouse ? -CONFIG.PERSON_SHIFT : 0;
                    const badgeR = 10;
                    const bx = xShift - CONFIG.HALF_BOX_WIDTH + badgeR - 2;
                    const by = -CONFIG.BOX_HEIGHT / 2 - badgeR + 2;
                    const badge = nodeEl.append("g")
                        .attr("class", "mobile-info-badge")
                        .on("click", (event) => {
                            event.stopPropagation();
                            showPersonDetails(d.id);
                        });
                    badge.append("circle").attr("cx", bx).attr("cy", by).attr("r", badgeR);
                    badge.append("text").attr("x", bx).attr("y", by).text("ⓘ");
                });
            }
        }

        // Function to adjust level controls (used by +/- buttons)
        function adjustLevel(direction, delta) {
            const input = document.getElementById(direction === 'up' ? 'levels-up' : 'levels-down');
            const maxVal = direction === 'up' ? CONFIG.MAX_GENERATIONS_UP : CONFIG.MAX_GENERATIONS_DOWN;
            const storageKey = direction === 'up' ? CONFIG.STORAGE_KEYS.LEVELS_UP : CONFIG.STORAGE_KEYS.LEVELS_DOWN;
            
            const currentVal = parseInt(input.value) || 0;
            const newVal = Math.max(0, Math.min(maxVal, currentVal + delta));
            input.value = newVal;
            
            if (direction === 'up') {
                levelsUp = newVal;
            } else {
                levelsDown = newVal;
            }
            localStorage.setItem(storageKey, newVal);
            
            if (currentRoot) renderTree(currentRoot);
        }
        
        // Toggle entire controls panel collapse/expand
        function toggleControlsPanel() {
            const panel = document.getElementById('controls-panel');
            panel.classList.toggle('collapsed');
            localStorage.setItem('controlsPanelCollapsed', panel.classList.contains('collapsed'));
        }

        async function init() {
            try {
                const { roots } = await loadData();
                
                document.getElementById('loading').style.display = 'none';
                
                // Initialize SVG
                svg = d3.select("#tree-svg");
                g = svg.append("g");
                
                // Setup zoom
                zoom = d3.zoom()
                    .scaleExtent([CONFIG.ZOOM.MIN_SCALE, CONFIG.ZOOM.MAX_SCALE])
                    .on("zoom", (event) => {
                        g.attr("transform", event.transform);
                    });
                
                svg.call(zoom);
                
                // Check URL parameter for focus person
                const urlParams = new URLSearchParams(window.location.search);
                const focusId = urlParams.get('focus');
                
                // Render the specified person or default to Yehuda Carmi (id=3)
                if (focusId && peopleMap.has(parseInt(focusId))) {
                    const personId = parseInt(focusId);
                    renderTree(personId);
                    addToHistory(personId); // Add to navigation history
                    const person = peopleMap.get(personId);
                    const displayPerson = window.searchablePeople.find(p => p.id === personId);
                    if (displayPerson) {
                        setSearchValue(displayPerson.displayName);
                    }
                } else {
                    const defaultPerson = allPeople.find(p => p.id === 3);
                    if (defaultPerson) {
                        renderTree(3);
                        addToHistory(3); // Add to navigation history
                        const displayPerson = window.searchablePeople.find(p => p.id === 3);
                        if (displayPerson) {
                            setSearchValue(displayPerson.displayName);
                        }
                    } else if (roots.length > 0) {
                        renderTree(roots[0].id);
                        addToHistory(roots[0].id); // Add to navigation history
                        const displayPerson = window.searchablePeople.find(p => p.id === roots[0].id);
                        if (displayPerson) {
                            setSearchValue(displayPerson.displayName);
                        }
                    }
                }
                
                // Search functionality is handled by setupSearchFunctionality()
                
                // Navigation buttons
                document.getElementById('nav-back-btn').addEventListener('click', () => {
                    navigateBack();
                });
                
                document.getElementById('nav-forward-btn').addEventListener('click', () => {
                    navigateForward();
                });
                
                document.getElementById('fit-btn').addEventListener('click', () => {
                    if (currentRoot) {
                        renderTree(currentRoot);
                    }
                });
                
                const updateLanguageButtons = () => {
                    document.getElementById('lang-toggle-he').classList.toggle('active', currentLanguage === 'he');
                    document.getElementById('lang-toggle-en').classList.toggle('active', currentLanguage === 'en');
                };
                
                updateLanguageButtons();
                
                document.getElementById('lang-toggle-he').addEventListener('click', () => {
                    if (currentLanguage !== 'he') {
                        currentLanguage = 'he';
                        localStorage.setItem('familyTreeLanguage', currentLanguage);
                        if (typeof langManager !== 'undefined') {
                            langManager.setLang('he');
                        }
                        updateLanguageButtons();
                        updateUILanguage();
                        populateDropdown();
                        if (currentRoot) {
                            renderTree(currentRoot);
                        }
                        // Refresh person details if panel is open
                        if (currentPersonId && document.getElementById('side-panel').classList.contains('open')) {
                            showPersonDetails(currentPersonId);
                        }
                    }
                });
                
                document.getElementById('lang-toggle-en').addEventListener('click', () => {
                    if (currentLanguage !== 'en') {
                        currentLanguage = 'en';
                        localStorage.setItem('familyTreeLanguage', currentLanguage);
                        if (typeof langManager !== 'undefined') {
                            langManager.setLang('en');
                        }
                        updateLanguageButtons();
                        updateUILanguage();
                        populateDropdown();
                        if (currentRoot) {
                            renderTree(currentRoot);
                        }
                        // Refresh person details if panel is open
                        if (currentPersonId && document.getElementById('side-panel').classList.contains('open')) {
                            showPersonDetails(currentPersonId);
                        }
                    }
                });
                
                // Initialize UI language
                updateUILanguage();
                
                document.getElementById('zoom-in-btn').addEventListener('click', () => {
                    svg.transition().call(zoom.scaleBy, 1.3);
                });
                
                document.getElementById('zoom-out-btn').addEventListener('click', () => {
                    svg.transition().call(zoom.scaleBy, 0.7);
                });
                
                // Level control event listeners
                const levelsUpInput = document.getElementById('levels-up');
                const levelsDownInput = document.getElementById('levels-down');
                
                // Initialize inputs from stored values
                levelsUpInput.value = levelsUp;
                levelsDownInput.value = levelsDown;
                
                // Shared handler for level changes
                const handleLevelUpChange = () => {
                    const val = parseInt(levelsUpInput.value);
                    levelsUp = isNaN(val) ? CONFIG.DEFAULT_LEVELS : Math.max(0, Math.min(CONFIG.MAX_GENERATIONS_UP, val));
                    levelsUpInput.value = levelsUp;
                    localStorage.setItem(CONFIG.STORAGE_KEYS.LEVELS_UP, levelsUp);
                    if (currentRoot) renderTree(currentRoot);
                };
                
                const handleLevelDownChange = () => {
                    const val = parseInt(levelsDownInput.value);
                    levelsDown = isNaN(val) ? CONFIG.DEFAULT_LEVELS : Math.max(0, Math.min(CONFIG.MAX_GENERATIONS_DOWN, val));
                    levelsDownInput.value = levelsDown;
                    localStorage.setItem(CONFIG.STORAGE_KEYS.LEVELS_DOWN, levelsDown);
                    if (currentRoot) renderTree(currentRoot);
                };
                
                // Listen to both 'input' and 'change' for better mobile compatibility
                levelsUpInput.addEventListener('input', handleLevelUpChange);
                levelsUpInput.addEventListener('change', handleLevelUpChange);
                
                levelsDownInput.addEventListener('input', handleLevelDownChange);
                levelsDownInput.addEventListener('change', handleLevelDownChange);
                
                document.getElementById('close-panel').addEventListener('click', () => {
                    document.getElementById('side-panel').classList.remove('open');
                    currentPersonId = null;
                    // On mobile, re-center on the focus person (always at SVG coordinate 0,0)
                    if (isMobilePhone() && currentRoot) {
                        const container = document.getElementById('tree-container');
                        const width = container.clientWidth;
                        const fullHeight = container.clientHeight;
                        const scale = d3.zoomTransform(svg.node()).k;
                        svg.transition().duration(300).call(zoom.transform,
                            d3.zoomIdentity.translate(width / 2, fullHeight / 2).scale(scale));
                        // Reset selection so next tap on same person re-opens profile directly
                        mobileSelectedId = null;
                    }
                });
                
                // Auto-fit tree when screen orientation changes (mobile rotation)
                let resizeTimeout;
                window.addEventListener('resize', () => {
                    // Debounce to avoid multiple rapid calls
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(() => {
                        if (currentRoot) {
                            renderTree(currentRoot);
                        }
                    }, 300);
                });
                
                // Keyboard navigation with arrow keys
                document.addEventListener('keydown', (event) => {
                    // Don't interfere if user is typing in an input field
                    if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') {
                        return;
                    }
                    
                    if (event.key === 'ArrowLeft') {
                        event.preventDefault();
                        navigateBack();
                    } else if (event.key === 'ArrowRight') {
                        event.preventDefault();
                        navigateForward();
                    }
                });
                
            } catch (error) {
                console.error('Initialization error:', error);
                document.getElementById('loading').textContent = 'שגיאה באתחול: ' + error.message;
            }
        }

        init();
    </script>
</body>
</html>
